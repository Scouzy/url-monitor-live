<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Fond : dégradé violet vers très sombre -->
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="45%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#0B0318"/>
    </linearGradient>

    <!-- Ombre portée sous l'œil (relief) -->
    <radialGradient id="eyeShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Sclère : blanc avec modelé (creux vers les bords) -->
    <radialGradient id="sclera" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="72%" stop-color="#F1EDFA"/>
      <stop offset="100%" stop-color="#C9BFE3"/>
    </radialGradient>

    <!-- Iris sphère : fort contraste -->
    <radialGradient id="irisSphere" cx="36%" cy="28%" r="100%">
      <stop offset="0%" stop-color="#D8B4FE"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="78%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#140530"/>
    </radialGradient>

    <!-- Reflet glossy iris -->
    <linearGradient id="glossIris" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Lumière réfléchie en bas de l'iris (effet bille) -->
    <linearGradient id="bounceLight" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>

    <!-- Vernis glossy global -->
    <linearGradient id="glossTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>

    <clipPath id="clipIcon">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
    <clipPath id="clipEye">
      <path d="M 76 256 C 140 150, 372 150, 436 256 C 372 362, 140 362, 76 256 Z"/>
    </clipPath>
  </defs>

  <!-- Fond arrondi -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgDark)"/>

  <!-- Ombre portée de l'œil (décalée vers le bas = relief) -->
  <ellipse cx="256" cy="286" rx="200" ry="86" fill="url(#eyeShadow)"/>

  <!-- Liseré clair au-dessus de l'œil (lumière qui accroche le bord) -->
  <path d="M 76 250 C 140 144, 372 144, 436 250" fill="none" stroke="#E9D5FF" stroke-width="5" opacity="0.5" stroke-linecap="round"/>

  <!-- Sclère avec modelé -->
  <path d="M 76 256 C 140 150, 372 150, 436 256 C 372 362, 140 362, 76 256 Z"
        fill="url(#sclera)"/>

  <!-- Ombre interne haute (paupière qui projette sur le blanc) -->
  <g clip-path="url(#clipEye)">
    <path d="M 60 240 C 140 140, 372 140, 452 240 L 452 120 L 60 120 Z" fill="#3B1A6E" opacity="0.28"/>
  </g>

  <!-- Ombre de contact sous l'iris -->
  <ellipse cx="256" cy="338" rx="84" ry="18" fill="#1E0A3C" opacity="0.45"/>

  <!-- Iris sphère -->
  <circle cx="256" cy="256" r="86" fill="url(#irisSphere)"/>
  <!-- Anneau sombre périphérique -->
  <circle cx="256" cy="256" r="86" fill="none" stroke="#0B0318" stroke-width="6" opacity="0.55"/>
  <!-- Lumière réfléchie en bas (effet bille) -->
  <path d="M 178 290 A 86 86 0 0 0 334 290 Q 256 322 178 290 Z" fill="url(#bounceLight)"/>

  <!-- Pupille : le 1 -->
  <text x="262" y="296" text-anchor="middle" font-family="Poppins, Montserrat, Arial, sans-serif"
        font-size="120" font-weight="800" fill="#FFFFFF">1</text>

  <!-- Reflet glossy demi-lune -->
  <path d="M 176 240 A 86 86 0 0 1 336 240 Q 256 208 176 240 Z" fill="url(#glossIris)" opacity="0.6"/>
  <circle cx="220" cy="210" r="15" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="244" cy="196" r="6" fill="#FFFFFF" opacity="0.7"/>

  <!-- Nom -->
  <text x="256" y="450" text-anchor="middle" font-family="Poppins, Montserrat, Arial, sans-serif"
        font-size="58" font-weight="800" fill="#FFFFFF" letter-spacing="1">G1Oeil</text>

  <!-- Vernis glossy global -->
  <g clip-path="url(#clipIcon)">
    <path d="M 0 0 H 512 V 190 Q 256 276 0 190 Z" fill="url(#glossTop)"/>
  </g>
</svg>

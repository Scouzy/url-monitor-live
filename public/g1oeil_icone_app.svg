<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Filtre ombre portée externe -->
    <filter id="fDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <!-- Filtre ombre interne (biseau encart) -->
    <filter id="fInnerShadow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feFlood flood-color="#000000" flood-opacity="0.75" result="flood"/>
      <feComposite in="flood" in2="SourceGraphic" operator="in" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="10" result="blurShadow"/>
      <feOffset dx="0" dy="6" result="offsetShadow"/>
      <feComposite in="SourceGraphic" in2="offsetShadow" operator="over"/>
    </filter>

    <!-- Fond : dégradé ultra-sombre -->
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#3B1270"/>
      <stop offset="40%" stop-color="#1A0640"/>
      <stop offset="100%" stop-color="#04010E"/>
    </linearGradient>

    <!-- Liseré bord haut (lumière incidente) -->
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Ombre portée concentrique sous l'œil -->
    <radialGradient id="eyeShadow" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.75"/>
      <stop offset="65%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Sclère : blanc nacré, creux sur les bords -->
    <radialGradient id="sclera" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#F8F4FF"/>
      <stop offset="60%" stop-color="#DDD0F5"/>
      <stop offset="100%" stop-color="#9B87C0"/>
    </radialGradient>

    <!-- Iris sphère très contrasté -->
    <radialGradient id="irisSphere" cx="34%" cy="26%" r="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="30%" stop-color="#7C3AED"/>
      <stop offset="65%" stop-color="#2E0D6E"/>
      <stop offset="100%" stop-color="#0A0220"/>
    </radialGradient>

    <!-- Reflet glossy iris -->
    <linearGradient id="glossIris" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Lumière réfléchie en bas de l'iris -->
    <linearGradient id="bounceLight" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>

    <!-- Vernis glossy supérieur -->
    <linearGradient id="glossTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="clipIcon">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
    <clipPath id="clipEye">
      <path d="M 76 256 C 140 150, 372 150, 436 256 C 372 362, 140 362, 76 256 Z"/>
    </clipPath>
  </defs>

  <!-- Fond arrondi sombre -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgDark)"/>

  <!-- Biseau : liseré lumineux haut (effet enfoncé) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none"
        stroke="url(#borderShine)" stroke-width="3"/>

  <!-- Ombre interne haute (effet encart 3D) -->
  <g clip-path="url(#clipIcon)">
    <path d="M 0 0 H 512 V 80 Q 256 140 0 80 Z" fill="#000000" opacity="0.55"/>
  </g>

  <!-- Ombre interne basse (sol) -->
  <g clip-path="url(#clipIcon)">
    <path d="M 0 512 H 512 V 440 Q 256 390 0 440 Z" fill="#000000" opacity="0.45"/>
  </g>

  <!-- Ombre portée de l'œil -->
  <ellipse cx="256" cy="292" rx="215" ry="90" fill="url(#eyeShadow)"/>

  <!-- Liseré clair sur bord supérieur de l'œil -->
  <path d="M 76 250 C 140 144, 372 144, 436 250" fill="none"
        stroke="#D8B4FE" stroke-width="4.5" opacity="0.55" stroke-linecap="round"/>

  <!-- Sclère -->
  <path d="M 76 256 C 140 150, 372 150, 436 256 C 372 362, 140 362, 76 256 Z"
        fill="url(#sclera)"/>

  <!-- Ombre interne paupière supérieure -->
  <g clip-path="url(#clipEye)">
    <path d="M 60 240 C 140 136, 372 136, 452 240 L 452 110 L 60 110 Z"
          fill="#1A0445" opacity="0.42"/>
  </g>

  <!-- Ombre interne paupière inférieure -->
  <g clip-path="url(#clipEye)">
    <path d="M 60 272 C 140 376, 372 376, 452 272 L 452 400 L 60 400 Z"
          fill="#0A0220" opacity="0.32"/>
  </g>

  <!-- Ombre de contact sous l'iris -->
  <ellipse cx="256" cy="342" rx="90" ry="20" fill="#000000" opacity="0.55"/>

  <!-- Iris sphère -->
  <circle cx="256" cy="256" r="88" fill="url(#irisSphere)" filter="url(#fDropShadow)"/>

  <!-- Anneau sombre périphérique (limbe) -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="#04010E" stroke-width="9" opacity="0.7"/>

  <!-- Lumière réfléchie basse -->
  <path d="M 176 292 A 88 88 0 0 0 336 292 Q 256 328 176 292 Z" fill="url(#bounceLight)"/>

  <!-- Pupille : le 1 -->
  <text x="262" y="298" text-anchor="middle" font-family="Poppins, Montserrat, Arial, sans-serif"
        font-size="118" font-weight="800" fill="#FFFFFF" opacity="0.97">1</text>

  <!-- Reflet glossy demi-lune haut -->
  <path d="M 176 238 A 88 88 0 0 1 336 238 Q 256 204 176 238 Z" fill="url(#glossIris)" opacity="0.55"/>

  <!-- Points de reflet -->
  <circle cx="218" cy="208" r="16" fill="#FFFFFF" opacity="0.92"/>
  <circle cx="244" cy="193" r="7" fill="#FFFFFF" opacity="0.65"/>

  <!-- Nom -->
  <text x="256" y="452" text-anchor="middle" font-family="Poppins, Montserrat, Arial, sans-serif"
        font-size="56" font-weight="800" fill="#D8B4FE" letter-spacing="2" opacity="0.92">G1Oeil</text>

  <!-- Vernis glossy global -->
  <g clip-path="url(#clipIcon)">
    <path d="M 0 0 H 512 V 185 Q 256 268 0 185 Z" fill="url(#glossTop)"/>
  </g>
</svg>
